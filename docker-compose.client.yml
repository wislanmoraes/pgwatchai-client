# ─────────────────────────────────────────────────────────────────────────────
#  pgwatch-ai — Template para implantação em parceiros
#
#  Uso:
#    1. Copie este arquivo para o servidor do parceiro
#    2. Crie um .env com as variáveis listadas abaixo
#    3. docker compose -f docker-compose.client.yml up -d
#
#  Pré-requisito: login no registry
#    echo $GHCR_TOKEN | docker login ghcr.io -u SEU_USUARIO --password-stdin
# ─────────────────────────────────────────────────────────────────────────────

x-images: &registry ghcr.io/wislanmoraes

services:

  # ── Banco de dados (TimescaleDB) ──────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: pgwatch_db
    environment:
      POSTGRES_USER:     ${DB_USER:-pgwatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatório}
      POSTGRES_DB:       ${DB_NAME:-pgwatch_ai}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - pgwatch_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pgwatch} -d ${DB_NAME:-pgwatch_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # TimescaleDB nunca expõe porta para o host — acessível apenas internamente

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    image: ghcr.io/wislanmoraes/pgwatchai-backend:${IMAGE_TAG:-latest}
    container_name: pgwatch_backend
    user: root   # necessário para acessar /var/run/docker.sock (WatchShell)
    environment:
      DATABASE_URL:      postgresql+asyncpg://${DB_USER:-pgwatch}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME:-pgwatch_ai}
      DATABASE_URL_SYNC: postgresql://${DB_USER:-pgwatch}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME:-pgwatch_ai}
      SECRET_KEY:        ${SECRET_KEY:?SECRET_KEY obrigatório}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COLLECTOR_INTERVAL_SECONDS:        ${COLLECTOR_INTERVAL_SECONDS:-60}
      ACTIVITY_SAMPLE_INTERVAL_SECONDS:  ${ACTIVITY_SAMPLE_INTERVAL_SECONDS:-5}
      ALERT_EVALUATION_INTERVAL_SECONDS: ${ALERT_EVALUATION_INTERVAL_SECONDS:-60}
      WATCHSHELL_IMAGE: ghcr.io/wislanmoraes/pgwatchai-watchshell:${IMAGE_TAG:-latest}
      GHCR_USER:  ${GHCR_USER:-wislanmoraes}
      GHCR_TOKEN: ${GHCR_TOKEN:-}
      HOST_DEPLOY_DIR: /host_deploy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # necessário para WatchShell / terminal
      - .:/host_deploy:ro                          # update.sh + compose file acessíveis pelo backend
    networks:
      - pgwatch_internal
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    # Backend nunca expõe porta para o host — acessível via nginx do frontend

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    image: ghcr.io/wislanmoraes/pgwatchai-frontend:${IMAGE_TAG:-latest}
    container_name: pgwatch_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"   # única porta exposta ao mundo externo
    networks:
      - pgwatch_internal
    depends_on:
      - backend
    restart: unless-stopped

  # ── WatchShell (ferramenta interativa — opcional) ─────────────────────────
  watchshell:
    image: ghcr.io/wislanmoraes/pgwatchai-watchshell:${IMAGE_TAG:-latest}
    container_name: pgwatch_watchshell
    profiles:
      - tools   # só sobe com: docker compose --profile tools up -d
    networks:
      - pgwatch_internal
    restart: unless-stopped

# ── Rede interna ─────────────────────────────────────────────────────────────
networks:
  pgwatch_internal:
    driver: bridge
    internal: false   # false = permite saída para internet (Anthropic API, etc.)
    # Para isolar completamente: mude para internal: true e use um proxy externo

# ── Volumes persistentes ──────────────────────────────────────────────────────
volumes:
  timescaledb_data:
